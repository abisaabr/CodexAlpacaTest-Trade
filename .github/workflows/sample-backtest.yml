name: sample-backtest

on:
  workflow_dispatch:
  pull_request:

jobs:
  sample-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run synthetic sample backtest
        run: python scripts/run_sample_backtest.py --synthetic
