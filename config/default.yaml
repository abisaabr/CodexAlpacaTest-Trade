# Paper-only repo lock: keep the Alpaca trading URL on paper, keep
# ALPACA_PAPER_TRADE=true, and keep LIVE_TRADING=false.
alpaca_paper_trade: true
alpaca_api_base_url: https://paper-api.alpaca.markets
alpaca_data_feed: iex
default_underlyings:
  - SPY
  - QQQ
data_root: data
reports_root: reports
log_level: INFO
live_trading: false
max_notional_per_trade: 1000
max_open_positions: 3
max_orders_per_run: 3
dry_run: true
request_timeout_seconds: 30
retry_attempts: 3
